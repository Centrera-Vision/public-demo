<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Centrera grafisk profil för Pong-spelet" />
</head>
<body>
  <!--
    Grafisk profil extraherad från Centrera-webbplatsen.
    Spelet läser data-* attribut från #theme-elementet.
  -->
  <div
    id="theme"
    data-background="#0F1419"
    data-primary="#E8572A"
    data-secondary="#E8184A"
    data-accent="#D4167A"
    data-text="#FFFFFF"
    data-text-secondary="#5A6C7D"
    data-font-family="'Poppins', sans-serif"
    data-paddle-color="#E8572A"
    data-paddle-color-right="#D4167A"
    data-ball-color="#FFFFFF"
    data-center-line-color="rgba(232, 87, 42, 0.3)"
    data-glow-effect="true"
    data-border-radius="16px"
  ></div>

  <!-- Centrera logo SVG -->
  <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
  </svg>
</body>
</html>
